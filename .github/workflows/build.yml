name: Build CV

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set date
        run: echo "DATE=$(date +%Y%m%d)" >> $GITHUB_ENV

      - name: Compile English CV
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: cv-renyi-en
          root_file: main.tex

      - name: Compile French CV
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: cv-renyi-fr
          root_file: main.tex

      - name: Rename PDFs with date
        run: |
          cp cv-renyi-en/main.pdf cv-en-renyi-${{ env.DATE }}.pdf
          cp cv-renyi-fr/main.pdf cv-fr-renyi-${{ env.DATE }}.pdf

      - name: Publish release
        run: |
          TAG="v${{ env.DATE }}"
          gh release delete "${TAG}" --yes 2>/dev/null || true
          git push origin --delete "${TAG}" 2>/dev/null || true
          gh release create "${TAG}" \
            --title "CV Ren Yi – ${{ env.DATE }}" \
            --notes "Built from commit [\`${GITHUB_SHA::7}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})" \
            --latest \
            "cv-en-renyi-${{ env.DATE }}.pdf" \
            "cv-fr-renyi-${{ env.DATE }}.pdf"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
